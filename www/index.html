<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>媽媽農業記帳 Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2b5d42">
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>

<body>
<div class="container">
  <h1>🌾 媽媽農業記帳 Pro</h1>
  <p class="today" id="todayText"></p>

  <div id="homePage" class="page active">
    <div class="summary">
      <div>本月收入：<span id="totalIncome">0</span> 元</div>
      <div>本月支出：<span id="totalExpense">0</span> 元</div>
      <div>本月剩餘：<span id="balance">0</span> 元</div>
      <div class="note">工項紀錄只做紀錄，不列入支出</div>
    </div>

    <div class="menu">
      <button onclick="showPage('incomePage')">💰 每週收入</button>
      <button onclick="showPage('expensePage')">💸 每週支出</button>
      <button onclick="showPage('workPage')">🌱 工項紀錄</button>
      <button onclick="showPage('workerPage')">👥 工人管理</button>
      <button onclick="showPage('reportPage')">📊 月報表</button>
      <button onclick="showPage('searchPage')">🔍 明細查詢</button>
      <button onclick="exportExcel()">📁 匯出 Excel</button>
    </div>
  </div>

  <div id="incomePage" class="page">
    <button class="back" onclick="showPage('homePage')">← 回首頁</button>
    <h2>💰 每週收入</h2>
    <input type="date" id="incomeDate">
    <input type="number" id="incomeAmount" placeholder="收入金額">
    <input type="text" id="incomeNote" placeholder="備註">
    <button onclick="addIncome()">新增收入</button>
    <table><thead><tr><th>日期</th><th>金額</th><th>備註</th><th>刪除</th></tr></thead><tbody id="incomeTable"></tbody></table>
  </div>

  <div id="expensePage" class="page">
    <button class="back" onclick="showPage('homePage')">← 回首頁</button>
    <h2>💸 每週支出</h2>
    <input type="date" id="expenseDate">
    <select id="expenseCategory" onchange="toggleOtherExpense()">
      <option>工資</option><option>工人伙食費</option><option>家人伙食費</option>
      <option>貸款繳納</option><option>工作用品</option><option>其他</option>
    </select>
    <input type="text" id="otherExpenseName" placeholder="請輸入其他支出名稱" style="display:none;">
    <input type="number" id="expenseAmount" placeholder="支出金額">
    <input type="text" id="expenseNote" placeholder="備註">
    <button onclick="addExpense()">新增支出</button>
    <table><thead><tr><th>日期</th><th>分類</th><th>金額</th><th>備註</th><th>刪除</th></tr></thead><tbody id="expenseTable"></tbody></table>
  </div>

  <div id="workPage" class="page">
    <button class="back" onclick="showPage('homePage')">← 回首頁</button>
    <h2>🌱 工項紀錄</h2>
    <input type="date" id="salaryDate">
    <select id="workerName"></select>
    <select id="workContent" onchange="toggleOtherWork()">
      <option>採收</option><option>搬運</option><option>包裝</option><option>除草</option>
      <option>噴藥</option><option>施肥</option><option>整地</option><option>其他</option>
    </select>
    <input type="text" id="otherWorkContent" placeholder="請輸入其他工作內容" style="display:none;">
    <input type="number" id="salaryAmount" placeholder="今日薪水">
    <input type="text" id="salaryNote" placeholder="備註">
    <button onclick="addSalary()">新增工項紀錄</button>

    <h3>本月工人工項</h3>
    <div id="workerSalaryCards"></div>
  </div>

  <div id="workerPage" class="page">
    <button class="back" onclick="showPage('homePage')">← 回首頁</button>
    <h2>👥 工人管理</h2>
    <input type="text" id="newWorkerName" placeholder="輸入新工人姓名">
    <button onclick="addWorker()">新增工人</button>
    <table><thead><tr><th>工人姓名</th><th>操作</th></tr></thead><tbody id="workerTable"></tbody></table>
  </div>

  <div id="reportPage" class="page">
    <button class="back" onclick="showPage('homePage')">← 回首頁</button>
    <h2>📊 月報表</h2>
    <label>選擇月份</label>
    <input type="month" id="monthPicker" onchange="showData()">
    <div class="summary">
      <div>收入：<span id="reportIncome">0</span> 元</div>
      <div>支出：<span id="reportExpense">0</span> 元</div>
      <div>剩餘：<span id="reportBalance">0</span> 元</div>
    </div>
    <h3>支出圓餅圖</h3>
    <canvas id="expenseChart" width="300" height="300"></canvas>
    <div id="chartLegend"></div>
  </div>

  <div id="searchPage" class="page">
    <button class="back" onclick="showPage('homePage')">← 回首頁</button>
    <h2>🔍 明細查詢</h2>
    <input type="month" id="searchMonth">
    <select id="searchType">
      <option value="all">全部</option>
      <option value="income">每週收入</option>
      <option value="expense">每週支出</option>
      <option value="salary">工項紀錄</option>
    </select>
    <button onclick="searchDetails()">查詢</button>
    <div id="searchResult"></div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
